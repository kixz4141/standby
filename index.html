*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:linear-gradient(180deg,#071018,#0a1a28);color:#e0f0ff;min-height:100vh;-webkit-tap-highlight-color:transparent}

.login-screen{position:fixed;inset:0;background:linear-gradient(180deg,#071018,#0a1a28);display:flex;align-items:center;justify-content:center;z-index:99999}
.login-box{text-align:center;width:90%;max-width:400px}
.login-box h1{font-size:22px;font-weight:900;margin-bottom:6px;background:linear-gradient(90deg,#2dd4a8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{font-size:13px;color:#7eaac4;margin-bottom:24px}
.login-box input{width:100%;padding:14px 18px;background:#0e1e2c;border:2px solid #1e3a50;border-radius:12px;color:#e0f0ff;font-size:18px;font-weight:700;outline:none;text-align:center;margin-bottom:16px}
.login-box input:focus{border-color:#2dd4a8}

.role-select{display:flex;gap:10px;margin-bottom:20px;justify-content:center}
.role-card{flex:1;padding:14px 8px;background:#0e1e2c;border:2px solid #1a2e40;border-radius:12px;cursor:pointer;transition:all .2s;text-align:center}
.role-card.active{border-color:#2dd4a8;background:#2dd4a810}
.role-card .role-icon{font-size:24px;margin-bottom:4px}
.role-card .role-name{font-size:13px;font-weight:700;color:#e0f0ff}
.role-card .role-desc{font-size:9px;color:#5a8090;margin-top:4px;line-height:1.3}
.role-card.active .role-name{color:#2dd4a8}
.login-submit{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;color:#091520;background:linear-gradient(135deg,#2dd4a8,#38bdf8)}
.login-submit:disabled{opacity:.3;cursor:not-allowed}
.login-history{margin-top:16px;font-size:12px;color:#5a8090}
.login-history span{display:inline-block;background:#0e1e2c;border:1px solid #1a2e40;border-radius:6px;padding:4px 12px;margin:4px;cursor:pointer;color:#7eaac4}
.login-history span:hover{border-color:#2dd4a8;color:#2dd4a8}
.tl-bar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#0c1e2e,#091520);padding:8px 16px 0;border-bottom:1px solid #132838}
.header{padding:12px 16px 0}
.title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.title-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.event-title{font-size:18px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,#2dd4a8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{font-size:10px;background:linear-gradient(135deg,#2dd4a8,#38bdf8);color:#091520;padding:2px 8px;border-radius:4px;font-weight:700}
.user-badge{font-size:10px;padding:3px 10px;border-radius:12px;cursor:pointer}
.role-badge-host{background:#2dd4a820;color:#2dd4a8;border:1px solid #2dd4a850}
.role-badge-director{background:#38bdf820;color:#38bdf8;border:1px solid #38bdf850}
.role-badge-staff{background:#a78bfa20;color:#a78bfa;border:1px solid #a78bfa50}
.clock{text-align:right}.clock-time{font-size:28px;font-weight:900;color:#e0f0ff;font-variant-numeric:tabular-nums;letter-spacing:2px;line-height:1}.clock-label{font-size:9px;color:#5a8090;margin-top:2px}
.timeline{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}.timeline::-webkit-scrollbar{display:none}
.tl-item{min-width:62px;padding:4px 5px;background:#0e1e2c;border:1px solid #1a2e40;border-radius:6px;cursor:pointer;text-align:center;transition:all .2s;flex-shrink:0}
.tl-item.done{border-color:rgba(45,212,168,.4);background:rgba(45,212,168,.08)}
.tl-item.selected{border-color:#ff8c42;background:rgba(255,140,66,.12)}
.tl-time{font-size:10px;font-weight:900;color:#e0f0ff}.tl-name{font-size:7px;color:#7eaac4;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55px;margin:0 auto}
.tl-count{font-size:7px;margin-top:2px}.c-rem{color:#f87171}.c-done{color:#2dd4a8}.c-sep{color:#2a4050}
.countdown-bar{background:linear-gradient(90deg,#0e1e2c,#102030,#0e1e2c);border-radius:8px;padding:8px 0;text-align:center;margin:8px 0;border:1px solid #1a2e40}
.countdown-text{color:#2dd4a8;font-size:15px;font-weight:700;letter-spacing:3px;font-variant-numeric:tabular-nums}
.offset-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}.offset-label{font-size:12px;color:#5a8090}
.offset-btn{padding:4px 10px;border-radius:6px;background:#0e1e2c;color:#7eaac4;border:1px solid #1a2e40;cursor:pointer;font-size:12px;font-weight:600}
.offset-btn.active{background:linear-gradient(135deg,#2dd4a8,#38bdf8);color:#091520;border:none}
.search-row{display:flex;gap:8px;padding-bottom:12px;align-items:center}.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#3a5a6a;font-size:14px;pointer-events:none}
.search-input{width:100%;padding:8px 14px 8px 34px;background:#091520;border:1px solid #1a2e40;border-radius:8px;color:#e0f0ff;font-size:14px;outline:none}
.search-input:focus{border-color:#2dd4a8}
.ctrl-btn{padding:8px 14px;background:#0e1e2c;border:1px solid #1a2e40;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.ctrl-btn.add{color:#38bdf8}.ctrl-btn.reset{color:#f87171}
.program{margin-top:22px;padding-bottom:18px;border-bottom:1px solid #0e1e2c;scroll-margin-top:120px}
.prog-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.prog-left{display:flex;align-items:center;gap:10px}.prog-bar{width:4px;height:38px;border-radius:2px}
.prog-name{font-size:15px;font-weight:800;cursor:default}.prog-time{font-size:11px;color:#5a8090}
.prog-right{display:flex;gap:8px;align-items:center}
.start-btn{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;border-width:1px;border-style:solid;background:transparent}
.prog-count{font-size:11px}
.perf-grid{display:flex;flex-wrap:wrap;gap:8px}

.perf-card.ready{background:#c8d8e4;border-color:#a0b8c8;opacity:.38;box-shadow:none}
.perf-card.ready .perf-name{color:#8898a8}
.perf-card.ready .perf-ruby{color:#9aa8b4}
.perf-card.drag-over{border:2px dashed #38bdf8}
.perf-card.edit-mode{border-color:#ff8c42;box-shadow:0 0 0 1px #ff8c4260}
.perf-card.bordered{border:3px solid #c62828!important;box-shadow:0 0 0 1px #c6282840}

.perf-grip{font-size:8px;color:#bcc8d0;letter-spacing:2px;margin-bottom:2px;line-height:1}
.perf-num{font-size:11px;font-weight:700;margin-bottom:3px;display:flex;justify-content:center;gap:4px;align-items:center;color:#1a1a2a}
.perf-role{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.perf-name{font-size:11px;font-weight:700;color:#1a1a2a;line-height:1.2;margin-bottom:1px;word-break:break-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.perf-ruby{font-size:8px;color:#8899aa;line-height:1.1}

.perf-card.ready .perf-check{background:#2b8a70;color:#fff;opacity:1}

.perf-card.ready .perf-checkedby{opacity:1}

.perf-card.ready .perf-stamp{color:#ff8c42;opacity:1}

.modal-box label{color:#7eaac4;font-size:12px;display:block;margin-bottom:4px}

.modal-box input:focus{border-color:#2dd4a8}
.modal-btns{display:flex;gap:10px;margin-top:6px}

.sync-badge{position:fixed;bottom:12px;right:16px;background:#0e1e2c;border:1px solid #1a2e40;border-radius:20px;padding:4px 12px;font-size:10px;color:#2dd4a8;display:flex;align-items:center;gap:6px;z-index:50}

.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.loading-spinner{width:32px;height:32px;border:3px solid #1a2e40;border-top-color:#2dd4a8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function applyFurigana(){
  var changed=false;
  if(!data.programs)return false;
  data.programs.forEach(function(p){
    if(!p.performers)return;
    p.performers.forEach(function(pf){
      if(pf.ruby)return;// 既にふりがながあればスキップ
      var name=pf.name;
      // 完全一致
      if(FURIGANA_MAP[name]){pf.ruby=FURIGANA_MAP[name];changed=true;return;}
      // スペース除去して一致
      var clean=name.replace(/\s/g,'');
      for(var k in FURIGANA_MAP){if(k.replace(/\s/g,'')===clean){pf.ruby=FURIGANA_MAP[k];changed=true;return;}}
      // 部分一致
      for(var k in FURIGANA_MAP){if(k.indexOf(name)>=0||name.indexOf(k)>=0){pf.ruby=FURIGANA_MAP[k];changed=true;return;}}
    });
  });
  return changed;
}

window.addEventListener('load',function(){
  try{
    if(typeof firebase==='undefined'){document.getElementById('app').innerHTML='<div class="loading-screen"><div style="color:#f87171">Firebase SDK読み込み失敗</div></div>';return;}
    firebase.initializeApp(FIREBASE_CONFIG);var db=firebase.database();dbRef=db.ref('standby-ga2026ss');
    dbRef.on('value',function(s){if(ignoreNextUpdate){ignoreNextUpdate=false;return;}var v=s.val();if(v){data=v;fillMissingStandby();render();}});
    db.ref('.info/connected').on('value',function(s){isOnline=s.val()===true;render();});
    dbRef.once('value').then(function(s){if(!s.val()){dbRef.set(data);}else{data=s.val();fillMissingStandby();}if(applyFurigana()){saveData();}render();});
    setInterval(render,1000);
  }catch(e){document.getElementById('app').innerHTML='<div class="loading-screen"><div style="color:#f87171">エラー: '+e.message+'</div></div>';}
});
function saveData(){ignoreNextUpdate=true;if(dbRef)dbRef.set(data);}

function fillMissingStandby(){
  var changed=false;
  if(!data.programs)return;
  data.programs.forEach(function(p){
    if(!p.standby&&p.honban){
      var parts=p.honban.split(':');
      var total=parseInt(parts[0])*60+parseInt(parts[1])-20;
      if(total<0)total=0;
      p.standby=String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
      changed=true;
    }
  });
  if(changed)saveData();
}

    if(can('start')&&total>0){h+='<button class="start-btn" style="border-color:'+prog.color+'50;color:'+prog.color+'" onclick="startAll(\''+prog.id+'\')">▶ スタート</button>';}
    if(total>0)h+='<span class="prog-count"><span class="c-rem" style="font-weight:600">未'+rem+'</span> <span class="c-done" style="font-weight:600">済'+done+'</span></span>';
    h+='</div></div>';

    if(total>0){
    h+='<div class="perf-grid">';
    for(var k=0;k<perfs.length;k++){
      var perf=perfs[k];
      var isMatch=q&&(perf.name.toLowerCase().indexOf(q)>=0||(perf.ruby&&perf.ruby.toLowerCase().indexOf(q)>=0));
      var dim=q&&!isMatch?'0.25':'1';
      var rb=perf.ready?'#b0c0cc':prog.color+'20';
      var rc=perf.ready?'#6a7a8a':prog.color;
      var cc='perf-card';if(perf.ready)cc+=' ready';if(dragOverId===perf.id)cc+=' drag-over';if(perf.bordered)cc+=' bordered';
      if(editMode&&can('edit'))cc+=' edit-mode';
      var clickAction='';
      if(editMode&&can('edit')){
        clickAction=' onclick="openEditPerf(\''+prog.id+'\',\''+perf.id+'\')"';
      }else if(isStaff){clickAction=' onclick="staffTap(\''+prog.id+'\',\''+perf.id+'\')"';}
      else if(can('toggle')){clickAction=' onclick="togglePerf(\''+prog.id+'\',\''+perf.id+'\')"';}
      h+='<div style="opacity:'+dim+';transition:opacity .2s">';
      h+='<div class="'+cc+'"';
      if(can('edit')&&!editMode)h+=' draggable="true" ondragstart="onDragStart(event,\''+perf.id+'\',\''+prog.id+'\')" ondragover="event.preventDefault();onDragOver(\''+perf.id+'\')" ondrop="event.preventDefault();event.stopPropagation();onDrop(\''+perf.id+'\',\''+prog.id+'\')"';
      h+=clickAction;
      h+='>';
      if(editMode&&can('edit'))h+='<div style="position:absolute;top:2px;right:4px;font-size:10px;">✏️</div>';
      if(perf.bordered)h+='<div style="position:absolute;bottom:2px;right:4px"><span class="perf-role" style="background:#c62828;color:#fff;font-size:8px">早替</span></div>';
      if(perf.keep)h+='<div style="position:absolute;bottom:2px;left:4px"><span class="perf-role" style="background:#1565c0;color:#fff;font-size:8px">KEEP</span></div>';
      h+='<div class="perf-num">';
      h+='<span>'+perf.num+'</span>';
      if(perf.role){var gc=getGroupColor(perf.role);if(gc){h+='<span class="perf-role" style="background:'+gc+';color:#fff;font-size:8px">'+esc(perf.role)+'</span>';}else{h+='<span class="perf-role" style="background:'+rb+';color:'+rc+'">'+esc(perf.role)+'</span>';}}
      h+='</div>';
      h+='<div class="perf-name">'+esc(perf.name)+'</div>';
      if(perf.ruby)h+='<div class="perf-ruby">'+esc(perf.ruby)+'</div>';
      if(perf.ready){if(perf.checkedBy)h+='<div class="perf-check">'+esc(perf.checkedBy)+'</div>';}
      if(perf.staffStamp){
        h+='<div class="perf-stamp">移動 '+esc(perf.staffStamp)+'</div>';
        if(perf.staffCheckedBy)h+='<div class="perf-checkedby">'+esc(perf.staffCheckedBy)+'</div>';
      }
      h+='</div></div>';
    }
    if(can('edit'))h+='<div class="add-card" onclick="addPerformer(\''+prog.id+'\')">＋</div>';
    h+='</div>';}
    else if(can('edit')){h+='<div class="perf-grid"><div class="add-card" onclick="addPerformer(\''+prog.id+'\')">＋</div></div>';}
    if(can('edit'))h+='<div class="del-prog"><span onclick="delProgram(\''+prog.id+'\')">プログラム削除</span></div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="sync-badge'+(isOnline?'':' offline')+'"><div class="sync-dot"></div>'+(isOnline?'リアルタイム同期中':'オフライン')+'</div>';

  mainContent.innerHTML=h;
  // Restore timeline scroll position
  var tlEl2=document.getElementById('timelineScroll');
  if(tlEl2&&tlScroll)tlEl2.scrollLeft=tlScroll;

  // Render modals to separate container (not affected by timer re-render)
  var modalContainer=document.getElementById('modalContainer');
  if(!modalContainer){modalContainer=document.createElement('div');modalContainer.id='modalContainer';document.body.appendChild(modalContainer);}
  var mh='';
  if(editPerf){
    mh+='<div class="modal-overlay" onclick="closeModals()"><div class="modal-box" onclick="event.stopPropagation()">';
    mh+='<h3>出演者編集</h3>';
    mh+='<label>番号</label><input type="number" id="eNum" value="'+editPerf.num+'">';
    mh+='<label>名前</label><input id="eName" value="'+esc(editPerf.name)+'">';
    mh+='<label>ふりがな</label><input id="eRuby" value="'+esc(editPerf.ruby)+'">';
    mh+='<label>役割</label><input id="eRole" value="'+esc(editPerf.role)+'">';
    mh+='<label>早替え</label><div style="display:flex;gap:10px;margin-bottom:14px"><button id="eBorderOn" onclick="editPerf.bordered=true;document.getElementById(\'eBorderOn\').style.background=\'#c62828\';document.getElementById(\'eBorderOn\').style.color=\'#fff\';document.getElementById(\'eBorderOff\').style.background=\'#0e1e2c\';document.getElementById(\'eBorderOff\').style.color=\'#7eaac4\'" style="flex:1;padding:8px;border-radius:8px;border:1px solid #c62828;cursor:pointer;font-size:13px;font-weight:700;background:'+(editPerf.bordered?'#c62828':'#0e1e2c')+';color:'+(editPerf.bordered?'#fff':'#7eaac4')+'">ON</button><button id="eBorderOff" onclick="editPerf.bordered=false;document.getElementById(\'eBorderOff\').style.background=\'#1e3a50\';document.getElementById(\'eBorderOff\').style.color=\'#fff\';document.getElementById(\'eBorderOn\').style.background=\'#0e1e2c\';document.getElementById(\'eBorderOn\').style.color=\'#7eaac4\'" style="flex:1;padding:8px;border-radius:8px;border:1px solid #1e3a50;cursor:pointer;font-size:13px;font-weight:700;background:'+(!editPerf.bordered?'#1e3a50':'#0e1e2c')+';color:'+(!editPerf.bordered?'#fff':'#7eaac4')+'">OFF</button></div>';
    mh+='<label>KEEP</label><div style="display:flex;gap:10px;margin-bottom:14px"><button id="eKeepOn" onclick="editPerf.keep=true;document.getElementById(\'eKeepOn\').style.background=\'#1565c0\';document.getElementById(\'eKeepOn\').style.color=\'#fff\';document.getElementById(\'eKeepOff\').style.background=\'#0e1e2c\';document.getElementById(\'eKeepOff\').style.color=\'#7eaac4\'" style="flex:1;padding:8px;border-radius:8px;border:1px solid #1565c0;cursor:pointer;font-size:13px;font-weight:700;background:'+(editPerf.keep?'#1565c0':'#0e1e2c')+';color:'+(editPerf.keep?'#fff':'#7eaac4')+'">ON</button><button id="eKeepOff" onclick="editPerf.keep=false;document.getElementById(\'eKeepOff\').style.background=\'#1e3a50\';document.getElementById(\'eKeepOff\').style.color=\'#fff\';document.getElementById(\'eKeepOn\').style.background=\'#0e1e2c\';document.getElementById(\'eKeepOn\').style.color=\'#7eaac4\'" style="flex:1;padding:8px;border-radius:8px;border:1px solid #1e3a50;cursor:pointer;font-size:13px;font-weight:700;background:'+(!editPerf.keep?'#1e3a50':'#0e1e2c')+';color:'+(!editPerf.keep?'#fff':'#7eaac4')+'">OFF</button></div>';
    mh+='<div style="margin-top:8px;text-align:right"><span style="font-size:11px;color:#f87171;cursor:pointer;text-decoration:underline" onclick="delPerformer()">削除</span></div>';
    mh+='<div class="modal-btns"><button class="modal-cancel" onclick="closeModals()">キャンセル</button><button class="modal-save" onclick="saveEditPerf()">保存</button></div>';
    mh+='</div></div>';
  }
  if(editProg){
    mh+='<div class="modal-overlay" onclick="closeModals()"><div class="modal-box" style="width:380px" onclick="event.stopPropagation()">';
    mh+='<h3>プログラム編集</h3>';
    mh+='<label>プログラム名</label><input id="epName" value="'+esc(editProg.name)+'">';
    mh+='<label>本番時間</label><input id="epHonban" value="'+esc(editProg.honban)+'">';
    mh+='<label>スタンバイ時間</label><input id="epStandby" value="'+esc(editProg.standby)+'">';
    mh+='<label>カラー</label><div class="color-row">';
    ['#2dd4a8','#34d399','#38bdf8','#60a5fa','#22d3ee','#06b6d4','#4ade80','#a78bfa','#ff8c42'].forEach(function(c){mh+='<div class="color-dot'+(editProg.color===c?' active':'')+'" style="background:'+c+'" onclick="editProg.color=\''+c+'\';renderModals();"></div>';});
    mh+='</div>';
    mh+='<div class="modal-btns"><button class="modal-cancel" onclick="closeModals()">キャンセル</button><button class="modal-save" onclick="saveEditProg()">保存</button></div>';
    mh+='</div></div>';
  }
  // Only update modal container if modal state changed (not during typing)
  if(!editPerf&&!editProg){modalContainer.innerHTML='';}
  else if(!document.querySelector('#modalContainer .modal-overlay')){modalContainer.innerHTML=mh;}
}

// ★★★ ログインパスワード設定（案件ごとに変更） ★★★
var ROLE_PASS={host:'4141',director:'0000'};
function selectRole(r){selectedRole=r;forceLoginRender=true;render();}
function submitLogin(){var el=document.getElementById('nameInput');var name=el?el.value.trim():'';if(!name){showLoginErr('名前を入力してください');return;}if(selectedRole==='host'||selectedRole==='director'){var pel=document.getElementById('passInput');var pass=pel?pel.value:'';if(pass!==ROLE_PASS[selectedRole]){showLoginErr('パスワードが正しくありません');return;}}currentUser=name;currentRole=selectedRole;showLogin=false;saveUserName({name:name,role:selectedRole});sessionStorage.setItem('sb-session',JSON.stringify({name:name,role:selectedRole}));render();}
function showLoginErr(msg){var el=document.getElementById('loginError');if(el)el.textContent=msg;}
function quickLogin(name,role){if(role==='host'||role==='director'){selectedRole=role;showLogin=true;forceLoginRender=true;render();setTimeout(function(){var el=document.getElementById('nameInput');if(el)el.value=name;},60);return;}currentUser=name;currentRole=role;showLogin=false;saveUserName({name:name,role:role});sessionStorage.setItem('sb-session',JSON.stringify({name:name,role:role}));render();}
function changeLogin(){showLogin=true;selectedRole=currentRole;forceLoginRender=true;render();}

var searchTimer=null;
// Search input is persistent DOM element — set up listener once after load
function initSearchInput(){
  var el=document.getElementById('searchInput');
  if(!el)return;
  var composing=false;
  el.addEventListener('compositionstart',function(){composing=true;});
  el.addEventListener('compositionend',function(){
    composing=false;
    search=el.value;
    render();
  });
  el.addEventListener('input',function(){
    if(composing)return;
    search=el.value;
    clearTimeout(searchTimer);
    searchTimer=setTimeout(render,200);
  });
}

function editSbTime(pid){
  if(!can('time'))return;
  var prog=data.programs.find(function(p){return p.id===pid;});
  if(!prog)return;
  var newSb=prompt('スタンバイ時間を入力（例: 14:30）',prog.standby||'');
  if(newSb===null)return;
  if(!/^\d{1,2}:\d{2}$/.test(newSb)){alert('HH:MM形式で入力してください');return;}
  prog.standby=newSb;
  saveData();render();
}

function editHonbanTime(pid){
  if(!can('time'))return;
  var prog=data.programs.find(function(p){return p.id===pid;});
  if(!prog)return;
  var newHonban=prompt('本番時間を入力（例: 14:30）',prog.honban||'');
  if(newHonban===null)return;
  if(!/^\d{1,2}:\d{2}$/.test(newHonban)){alert('HH:MM形式で入力してください');return;}
  prog.honban=newHonban;
  saveData();render();
}

function togglePerf(pid,aid){var prog=data.programs.find(function(p){return p.id===pid;});if(!prog)return;var perf=prog.performers.find(function(a){return a.id===aid;});if(!perf)return;perf.ready=!perf.ready;if(perf.ready){perf.checkedBy=currentUser;perf.checkedAt=nowTimeStr();}else{perf.checkedBy='';perf.checkedAt='';}saveData();render();}
function staffTap(pid,aid){var prog=data.programs.find(function(p){return p.id===pid;});if(!prog)return;var perf=prog.performers.find(function(a){return a.id===aid;});if(!perf)return;if(perf.staffStamp){perf.staffStamp='';perf.staffCheckedBy='';}else{perf.staffStamp=nowTimeStr();perf.staffCheckedBy=currentUser;}saveData();render();}
function startAll(pid){if(!can('start'))return;var prog=data.programs.find(function(p){return p.id===pid;});if(!prog)return;var ts=nowTimeStr();prog.performers.forEach(function(a){a.ready=true;a.checkedBy=currentUser;a.checkedAt=ts;});saveData();render();}
function resetAll(){if(!can('edit'))return;data.programs.forEach(function(p){if(p.performers)p.performers.forEach(function(a){a.ready=false;a.checkedBy='';a.checkedAt='';a.staffStamp='';a.staffCheckedBy='';});});saveData();render();}
function addPerformer(pid){if(!can('edit'))return;var prog=data.programs.find(function(p){return p.id===pid;});if(!prog)return;if(!prog.performers)prog.performers=[];prog.performers.push({id:'n'+Date.now(),num:prog.performers.length+1,name:'新規',ruby:'',role:'',ready:false,checkedBy:'',checkedAt:'',staffStamp:''});saveData();render();}
function addProgram(){
  if(currentRole!=='host')return;
  var name=prompt('プログラム名を入力（例: SPECIAL SHOW / ゲスト名）');
  if(!name)return;
  var honban=prompt('本番時間を入力（例: 15:30）','00:00');
  if(!honban)return;
  if(!/^\d{1,2}:\d{2}$/.test(honban)){alert('HH:MM形式で入力してください');return;}
  var colorChoices=['#2dd4a8','#38bdf8','#34d399','#22d3ee','#4ade80','#ff8c42','#a78bfa','#60a5fa'];
  var colorLabels=['OPENING','SHOW','LIVE','SP SHOW','協賛','SP FASHION','DJ','MC'];
  var colorMsg='カラーを番号で選択：\n';
  for(var ci=0;ci<colorChoices.length;ci++){colorMsg+=(ci+1)+'. '+colorLabels[ci]+'\n';}
  var colorIdx=parseInt(prompt(colorMsg,'2'))-1;
  if(isNaN(colorIdx)||colorIdx<0||colorIdx>=colorChoices.length)colorIdx=1;
  var newId='s'+Date.now();
  var newProg={id:newId,name:name,honban:honban,standby:'',color:colorChoices[colorIdx],performers:[]};
  // Insert in chronological order using minutes comparison
  function toMin(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
  var newMin=toMin(honban);
  var inserted=false;
  for(var i=0;i<data.programs.length;i++){
    if(toMin(data.programs[i].honban)>newMin){data.programs.splice(i,0,newProg);inserted=true;break;}
  }
  if(!inserted)data.programs.push(newProg);
  fillMissingStandby();
  saveData();render();
  setTimeout(function(){scrollToProg(newId);},100);
}
function resetToInitial(){if(!can('edit'))return;if(!confirm('全データを初期状態に戻しますか？'))return;data=JSON.parse(JSON.stringify(INITIAL_DATA));saveData();render();}
function delProgram(pid){if(!can('edit'))return;var prog=data.programs.find(function(p){return p.id===pid;});if(!prog||!confirm('「'+prog.name+'」を削除？'))return;data.programs=data.programs.filter(function(p){return p.id!==pid;});saveData();render();}
function delPerformer(){if(!can('edit')||!editPerf||!editPerfProgId)return;if(!confirm('「'+editPerf.name+'」を削除？'))return;var prog=data.programs.find(function(p){return p.id===editPerfProgId;});if(!prog)return;prog.performers=prog.performers.filter(function(a){return a.id!==editPerf.id;});prog.performers.forEach(function(a,i){a.num=i+1;});editPerf=null;editPerfProgId=null;saveData();render();}
function scrollToProg(pid){var el=document.getElementById('prog-'+pid);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function selectProgram(pid){selectedProgramId=(selectedProgramId===pid)?'':pid;render();scrollToProg(pid);}
function openEditPerf(pid,aid){if(!can('edit'))return;var prog=data.programs.find(function(p){return p.id===pid;});editPerf=JSON.parse(JSON.stringify(prog.performers.find(function(a){return a.id===aid;})));editPerfProgId=pid;render();}
function openEditProg(pid){if(!can('edit'))return;editProg=JSON.parse(JSON.stringify(data.programs.find(function(p){return p.id===pid;})));render();}
function closeModals(){editPerf=null;editPerfProgId=null;editProg=null;var mc=document.getElementById('modalContainer');if(mc)mc.innerHTML='';render();}
function renderModals(){var mc=document.getElementById('modalContainer');if(!mc)return;mc.innerHTML='';render();}
function saveEditPerf(){var prog=data.programs.find(function(p){return p.id===editPerfProgId;});var perf=prog.performers.find(function(a){return a.id===editPerf.id;});perf.num=parseInt(document.getElementById('eNum').value)||0;perf.name=document.getElementById('eName').value;perf.ruby=document.getElementById('eRuby').value;perf.role=document.getElementById('eRole').value;perf.bordered=!!editPerf.bordered;perf.keep=!!editPerf.keep;editPerf=null;editPerfProgId=null;saveData();render();}
function saveEditProg(){var prog=data.programs.find(function(p){return p.id===editProg.id;});prog.name=document.getElementById('epName').value;prog.honban=document.getElementById('epHonban').value;prog.standby=document.getElementById('epStandby').value;prog.color=editProg.color;editProg=null;saveData();render();}
function onDragStart(e,perfId,progId){if(!can('edit'))return;dragSrc={perfId:perfId,progId:progId};e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','');}
function onDragOver(perfId){if(dragOverId!==perfId){dragOverId=perfId;render();}}
function onDrop(perfId,progId){if(!dragSrc||!can('edit'))return;var srcId=dragSrc.perfId,srcProg=dragSrc.progId;if(srcProg===progId){var p=data.programs.find(function(x){return x.id===progId;});var si=p.performers.findIndex(function(a){return a.id===srcId;});var ti=p.performers.findIndex(function(a){return a.id===perfId;});if(si===-1||ti===-1)return;var m=p.performers.splice(si,1)[0];p.performers.splice(ti,0,m);p.performers.forEach(function(a,i){a.num=i+1;});}else{var sp=data.programs.find(function(x){return x.id===srcProg;});var tp=data.programs.find(function(x){return x.id===progId;});var si2=sp.performers.findIndex(function(a){return a.id===srcId;});var ti2=tp.performers.findIndex(function(a){return a.id===perfId;});if(si2===-1)return;var m2=sp.performers.splice(si2,1)[0];tp.performers.splice(ti2===-1?tp.performers.length:ti2,0,m2);sp.performers.forEach(function(a,i){a.num=i+1;});tp.performers.forEach(function(a,i){a.num=i+1;});}dragSrc=null;dragOverId=null;saveData();render();}
function handleDropOnProg(pid,e){e.preventDefault();if(!dragSrc||!can('edit')||dragSrc.progId===pid)return;var sp=data.programs.find(function(x){return x.id===dragSrc.progId;});var tp=data.programs.find(function(x){return x.id===pid;});var si=sp.performers.findIndex(function(a){return a.id===dragSrc.perfId;});if(si===-1)return;var m=sp.performers.splice(si,1)[0];m.num=tp.performers.length+1;tp.performers.push(m);sp.performers.forEach(function(a,i){a.num=i+1;});dragSrc=null;dragOverId=null;saveData();render();}
</script>
